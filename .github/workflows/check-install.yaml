name: 'Check install scripts'

on:
  push:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'

jobs:
  install-linux:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up just
        uses: taiki-e/install-action@just
      - name: Check
        run: |
          just DISTRO=ubuntu test-install

  bootstrap-linux:
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        distro: ["ubuntu", "debian"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up just
        uses: taiki-e/install-action@just
      - name: Check
        run: |
          just GITHUB_REF_NAME=${{ github.ref_name }} DISTRO=${{ matrix.distro }} test-bootstrap

  install-macos:
    runs-on: "macos-latest"
    steps:
      - uses: actions/checkout@v6
      - name: Set up just
        uses: taiki-e/install-action@just
      - name: Check
        run: |
          backup_all=true just macos-install
